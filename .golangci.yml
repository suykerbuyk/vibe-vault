version: "2"
run:
  modules-download-mode: readonly
linters:
  enable:
    - forbidigo
  disable:
    - depguard
    - exhaustruct
    - funlen
    - gochecknoglobals
    - gochecknoinits
    - ireturn
    - mnd
    - musttag
    - nlreturn
    - nonamedreturns
    - testpackage
    - varnamelen
    - wrapcheck
    - wsl
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
    forbidigo:
      forbid:
        - pattern: '^os\.UserHomeDir$'
          msg: 'use buildEnvWithHome/buildEnvWithHomeUser sandbox helpers; canary helpers may bypass with //nolint:forbidigo + justification comment'
      analyze-types: true
    govet:
      enable:
        - shadow
    staticcheck:
      checks:
        - all
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
        path: _test\.go
      - linters: [forbidigo]
        path-except: '^test/.*_test\.go$'
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 50
  max-same-issues: 5
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
